<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2a0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="160" rx="12" ry="12" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="3" y="3" width="394" height="154" rx="10" ry="10" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Dinosaur footprint left -->
  <g transform="translate(28, 55)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="7" ry="9" fill="#16a34a" transform="rotate(-20)"/>
    <ellipse cx="14" cy="-6" rx="5" ry="7" fill="#16a34a" transform="rotate(-10)"/>
    <ellipse cx="24" cy="4" rx="5" ry="7" fill="#16a34a" transform="rotate(10)"/>
    <ellipse cx="8" cy="16" rx="14" ry="10" fill="#16a34a"/>
    <ellipse cx="8" cy="26" rx="8" ry="6" fill="#16a34a"/>
  </g>

  <!-- Dinosaur footprint right -->
  <g transform="translate(348, 90)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="6" ry="8" fill="#16a34a" transform="rotate(-20)"/>
    <ellipse cx="12" cy="-5" rx="4" ry="6" fill="#16a34a" transform="rotate(-10)"/>
    <ellipse cx="20" cy="3" rx="4" ry="6" fill="#16a34a" transform="rotate(10)"/>
    <ellipse cx="6" cy="14" rx="11" ry="8" fill="#16a34a"/>
    <ellipse cx="6" cy="22" rx="6" ry="5" fill="#16a34a"/>
  </g>

  <!-- Main title: JURASSIC -->
  <text
    x="200"
    y="72"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'sans-serif'"
    font-size="52"
    font-weight="900"
    letter-spacing="6"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >JURASSIC</text>

  <!-- Divider line with diamonds -->
  <line x1="60" y1="84" x2="155" y2="84" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="200,78 207,84 200,90 193,84" fill="#f59e0b" opacity="0.9"/>
  <line x1="245" y1="84" x2="340" y2="84" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Sub title: RUN -->
  <text
    x="200"
    y="130"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'sans-serif'"
    font-size="46"
    font-weight="900"
    letter-spacing="22"
    fill="url(#subGrad)"
    filter="url(#shadow)"
  >RUN</text>

  <!-- Corner accents -->
  <path d="M 10 10 L 30 10 L 30 14 L 14 14 L 14 30 L 10 30 Z" fill="#22c55e" opacity="0.5"/>
  <path d="M 390 10 L 370 10 L 370 14 L 386 14 L 386 30 L 390 30 Z" fill="#22c55e" opacity="0.5"/>
  <path d="M 10 150 L 30 150 L 30 146 L 14 146 L 14 130 L 10 130 Z" fill="#22c55e" opacity="0.5"/>
  <path d="M 390 150 L 370 150 L 370 146 L 386 146 L 386 130 L 390 130 Z" fill="#22c55e" opacity="0.5"/>
</svg>
