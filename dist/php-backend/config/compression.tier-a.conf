# =============================================================================
# Tier A — Compression config (Brotli + Gzip) for nginx and Apache
# =============================================================================
# This file is documentation + ready-to-paste snippets. It does NOT modify any
# live config on its own. Pick the section matching your web server, paste it
# in, reload, verify with `curl -H 'Accept-Encoding: br,gzip' -I https://...`.
#
# Goal: cut JS/CSS/JSON wire bytes by ~70-85% (Brotli) or ~60-70% (Gzip)
# without re-encoding hashed static assets per request.
#
# SAFETY: pure transport-layer change. The site keeps serving the same bytes
# semantically; only Content-Encoding differs. Browsers negotiate via the
# Accept-Encoding header. Disabling at any time = remove the lines and reload.
# =============================================================================


# =============================================================================
# === NGINX ===================================================================
# =============================================================================
# Place inside http { ... } or server { ... } block in nginx.conf.
# Recommended: ship pre-compressed .br and .gz files alongside hashed assets
# (Vite plugins can produce these at build time) and let nginx serve them
# directly via ngx_brotli_static / gzip_static — that avoids per-request CPU.

# --- Gzip (always available) ---
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    application/wasm
    image/svg+xml
    font/ttf
    font/otf
    font/eot;
# Serve pre-compressed *.gz if a sibling file exists (no per-request CPU).
gzip_static on;

# --- Brotli (requires ngx_brotli module — `apt install libnginx-mod-brotli`
#     on Debian/Ubuntu, or compile with --add-module=ngx_brotli) ---
# brotli on;
# brotli_static on;
# brotli_comp_level 5;            # 4-6 is the sweet spot for dynamic content
# brotli_min_length 1024;
# brotli_types
#     text/plain
#     text/css
#     application/javascript
#     application/json
#     application/xml
#     application/wasm
#     image/svg+xml
#     font/ttf
#     font/otf;


# =============================================================================
# === APACHE 2.4 ==============================================================
# =============================================================================
# Place inside the relevant <VirtualHost> or in /etc/apache2/conf-enabled/.
# Apache 2.4 ships with mod_deflate (gzip) by default. mod_brotli is available
# in Apache 2.4.26+ and may need: `a2enmod brotli`.

<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/plain
    AddOutputFilterByType DEFLATE text/html
    AddOutputFilterByType DEFLATE text/xml
    AddOutputFilterByType DEFLATE text/css
    AddOutputFilterByType DEFLATE text/javascript
    AddOutputFilterByType DEFLATE application/javascript
    AddOutputFilterByType DEFLATE application/x-javascript
    AddOutputFilterByType DEFLATE application/json
    AddOutputFilterByType DEFLATE application/xml
    AddOutputFilterByType DEFLATE application/xml+rss
    AddOutputFilterByType DEFLATE application/rss+xml
    AddOutputFilterByType DEFLATE application/atom+xml
    AddOutputFilterByType DEFLATE application/wasm
    AddOutputFilterByType DEFLATE image/svg+xml
    AddOutputFilterByType DEFLATE font/ttf
    AddOutputFilterByType DEFLATE font/otf

    # Don't re-compress already-compressed binaries.
    SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|avif|ico|woff2?|mp4|zip|gz|br)$ no-gzip
</IfModule>

# Brotli — uncomment after `a2enmod brotli`.
# <IfModule mod_brotli.c>
#     AddOutputFilterByType BROTLI_COMPRESS text/html text/css text/javascript
#     AddOutputFilterByType BROTLI_COMPRESS application/javascript application/json
#     AddOutputFilterByType BROTLI_COMPRESS application/xml application/wasm
#     AddOutputFilterByType BROTLI_COMPRESS image/svg+xml font/ttf font/otf
#
#     # Tier 4 (default) is fast; tier 5 squeezes ~5% more at modest CPU cost.
#     BrotliCompressionQuality 5
# </IfModule>


# =============================================================================
# === VERIFICATION ============================================================
# =============================================================================
# After reload, confirm with:
#
#   curl -sI -H 'Accept-Encoding: br' https://YOUR_HOST/assets/index-XXXX.js \
#     | grep -i 'content-encoding'
#       -> expect: content-encoding: br
#
#   curl -sI -H 'Accept-Encoding: gzip' https://YOUR_HOST/assets/index-XXXX.js \
#     | grep -i 'content-encoding'
#       -> expect: content-encoding: gzip
#
# If you don't see these headers, your CDN may already be decompressing and
# re-compressing — check the CDN settings before assuming the origin is wrong.


# =============================================================================
# === BUILD-TIME PRE-COMPRESSION (optional, recommended) ======================
# =============================================================================
# To eliminate per-request CPU entirely, generate .br and .gz files at build:
#
#   npm i -D vite-plugin-compression
#
#   # vite.config.js
#   import compression from 'vite-plugin-compression';
#   plugins: [
#     react(),
#     compression({ algorithm: 'brotliCompress', ext: '.br' }),
#     compression({ algorithm: 'gzip', ext: '.gz' }),
#   ];
#
# Then enable `gzip_static on;` and `brotli_static on;` (nginx) or
# `mod_rewrite`-based content negotiation (Apache) so the web server serves
# the pre-compressed file directly when one exists.
