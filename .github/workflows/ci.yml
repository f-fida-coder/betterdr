name: CI

# Money-critical platform: gate every push and PR on a clean PHP lint, the
# backend test suite, and a successful frontend build. This does NOT touch
# deployment (still `git reset --hard origin/main` on the VPS) — it is purely a
# pre-merge safety net so a syntax error, a failing settlement test, or a
# broken build never reaches `main` (which is the deploy artifact).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer commit on the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: PHP lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: none

      - name: Lint all backend PHP (php -l)
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"
              php -l "$f" || true
              fail=1
            fi
          done < <(find php-backend/src php-backend/tests php-backend/public -name '*.php')
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "PHP lint clean."

      - name: Run backend test suite
        working-directory: php-backend
        run: php tests/run.php

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Hard gate: fail the build if a real .env file or a secret signature
      # (Stripe/AWS/Google key, PEM private key, real value in a tracked env
      # file) was committed. Read-only; scans only git-tracked files.
      - name: Scan for committed secrets / env files
        run: node tools/qa/secret-scan.mjs

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Board / bet-mode drift check
        run: node tools/qa/board-parity.mjs

      - name: Round Robin preview math (k=N bound + backend parity)
        run: node tools/qa/round-robin-preview.mjs

      - name: Bet-slip / receipt selection labels (shared formatLegLabel)
        run: node tools/qa/leg-label.mjs

      - name: My Bets logo cache identity (same-city collision guard)
        run: node tools/qa/team-logo-key.mjs

      - name: Bet defaults — split Straight/Parlay stake mode (fallback + bucket + don't-stomp)
        run: node frontend/scripts/test-bet-default-mode.mjs

      - name: Min-bet floor snap (WIN back-solve below min → auto-raise, cap-vs-min)
        run: node frontend/scripts/test-min-bet-floor.mjs

      - name: Build
        working-directory: frontend
        run: npm run build
