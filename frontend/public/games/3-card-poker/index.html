        <!-- ═══════════════════════════════════════════════════════════════════
             BetterDR postMessage integration bridge for 3-Card Poker
             Must run before $(document).ready so __3cp_attachEvents is defined
             ═══════════════════════════════════════════════════════════════════ -->
        <script>
        (function () {
            'use strict';

            // ─────────────────────────────────────────────────────────────
            // Server-authoritative TWO-STAGE bridge (Phase 1: shown == paid).
            //   DEAL   : onDeal → placeBet{action:'deal'} → server deals BOTH
            //            hands, withholds the dealer, returns the PLAYER cards +
            //            roundId → __serverDealArrived renders them.
            //   SETTLE : onFold/onPlay → placeBet{action:'settle',roundId} →
            //            server reveals the dealer + pays on the EXACT committed
            //            cards → __serverSettleArrived reveals + snaps balance.
            // No hand is dealt or settled locally; the server is the sole
            // outcome + money authority.
            // ─────────────────────────────────────────────────────────────

            var _serverBalance  = null;   // last authoritative balance from parent
            var _pendingReqId   = null;   // in-flight request id
            var _pendingAction  = null;   // 'deal' | 'settle' | null

            var _parentOrigin = (function () {
                try {
                    if (document.referrer) return new URL(document.referrer).origin;
                } catch (e) { /* ignore */ }
                try {
                    return window.parent.location.origin;
                } catch (e) { /* cross-origin — fall back */ }
                return window.location.origin;
            }());

            function _createReqId() {
                return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 12);
            }

            function _sendToParent(msg) {
                try { window.parent.postMessage(msg, _parentOrigin); } catch (e) { /* standalone */ }
            }

            function _requestBalance(reqId) {
                _sendToParent({ type: 'getBalance', requestId: reqId || _createReqId() });
            }

            function _game() {
                return (typeof s_oGame !== 'undefined' && s_oGame) ? s_oGame : null;
            }

            function _extractBalance(msg) {
                var b = parseFloat(
                    msg.availableBalance != null ? msg.availableBalance :
                    msg.balance != null          ? msg.balance :
                    msg.newBalance != null        ? msg.newBalance : NaN
                );
                return (isFinite(b) && b >= 0) ? b : null;
            }

            // ── Receive messages from parent (CasinoView.jsx) ─────────────
            window.addEventListener('message', function (evt) {
                if (evt.origin !== _parentOrigin) return;
                var msg = evt.data;
                if (!msg || typeof msg !== 'object' || !msg.type) return;

                if (msg.type === 'balanceUpdate') {
                    var bal = _extractBalance(msg);
                    if (bal === null) return;
                    _serverBalance = bal;
                    // Only push balance into the game between hands — never while
                    // a deal/settle is in flight (the engine owns the display then).
                    if (_pendingAction === null) {
                        var g = _game();
                        if (g && typeof g.setCredit === 'function') { g.setCredit(bal); }
                    }
                    return;
                }

                if (msg.type === 'betResult') {
                    var newBal = _extractBalance(msg);
                    if (newBal !== null) { _serverBalance = newBal; }
                    var action = _pendingAction;
                    _pendingReqId  = null;
                    _pendingAction = null;
                    var g2 = _game();
                    if (!g2) { return; }
                    if (action === 'deal' && typeof g2.__serverDealArrived === 'function') {
                        g2.__serverDealArrived(msg);
                    } else if (action === 'settle' && typeof g2.__serverSettleArrived === 'function') {
                        g2.__serverSettleArrived(msg);
                    }
                    return;
                }

                if (msg.type === 'betError') {
                    var wasDeal = (_pendingAction === 'deal');
                    _pendingReqId  = null;
                    _pendingAction = null;
                    var g3 = _game();
                    if (g3 && typeof g3.__serverRoundAborted === 'function') {
                        g3.__serverRoundAborted(wasDeal, msg && msg.error ? String(msg.error) : '');
                    }
                    _requestBalance();
                    return;
                }
            });

            // ── Global callbacks invoked by CGame.js hooks ────────────────

            /** STAGE 1: CGame.onDeal() → request the server deal. */
            window.__3cp_requestDeal = function (info) {
                if (_pendingAction !== null) { return; }   // one round-trip at a time
                _pendingReqId  = _createReqId();
                _pendingAction = 'deal';
                _sendToParent({
                    type      : 'placeBet',
                    game      : '3card-poker',
                    requestId : _pendingReqId,
                    bets      : {
                        action   : 'deal',
                        Ante     : parseFloat(info && info.ante)     || 0,
                        PairPlus : parseFloat(info && info.pairPlus) || 0
                    }
                });
            };

            /** STAGE 2: CGame.onFold()/onPlay() → request the server settle. */
            window.__3cp_requestSettle = function (info) {
                if (_pendingAction !== null) { return; }
                _pendingReqId  = _createReqId();
                _pendingAction = 'settle';
                _sendToParent({
                    type      : 'placeBet',
                    game      : '3card-poker',
                    requestId : _pendingReqId,
                    bets      : {
                        action  : 'settle',
                        roundId : info && info.roundId ? String(info.roundId) : '',
                        folded  : (info && info.folded) ? 1 : 0
                    }
                });
            };

            // ── Attach jQuery game events (called after CMain is created) ──
            window.__3cp_attachEvents = function (oMain) {
                $(oMain).on('recharge',      function () { _requestBalance(); });
                $(oMain).on('start_session', function () { _requestBalance(); });
                $(oMain).on('end_session',   function () { /* noop */ });
                $(oMain).on('bet_placed',    function () { /* noop — bets are sent at deal */ });
                // save_score only fires on exit now; settlement is done at fold/play.
                $(oMain).on('save_score',    function () { /* noop — no local settle post */ });
                $(oMain).on('show_interlevel_ad', function () { /* noop */ });
                $(oMain).on('share_event',        function () { /* noop */ });
            };

            // Request balance on load; retry once in case the iframe isn't ready yet
            window.addEventListener('load', function () {
                _requestBalance();
                setTimeout(_requestBalance, 1500);
            });

        }());
        </script>

        <!-- ═══════════════════════════════════════════════════════════════════
             Game initialisation
             ═══════════════════════════════════════════════════════════════════ -->
        <script>
            $(document).ready(function(){
                var oMain = new CMain({
                    win_occurrence: 40,         // WIN OCCURRENCE PERCENTAGE (0-100)
                    min_bet: 1,                 // MIN BET ($1)
                    max_bet: 300,               // MAX BET ($300)
                    money: 100,                 // STARTING CREDIT (overridden by server balance)
                    game_cash: 100,             // HOUSE BANKROLL
                    ante_payout:[
                        5,                      // STRAIGHT FLUSH multiplier
                        4,                      // THREE OF A KIND multiplier
                        1                       // STRAIGHT multiplier
                    ],
                    plus_payouts:[
                        40,                     // STRAIGHT FLUSH
                        30,                     // THREE OF A KIND
                         6,                     // STRAIGHT
                         4,                     // FLUSH
                         1                      // PAIR
                    ],
                    time_show_hand: 1500,
                    audio_enable_on_startup: false,
                    show_credits: true,
                    fullscreen: true,
                    check_orientation: false,
                    ad_show_counter: 10
                });

                // Attach BetterDR integration event hooks
                if (typeof window.__3cp_attachEvents === 'function') {
                    window.__3cp_attachEvents(oMain);
                }

                if (isIOS()) {
                    setTimeout(function () { sizeHandler(); }, 200);
                } else {
                    sizeHandler();
                }
            });
        </script>
