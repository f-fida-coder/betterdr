<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talisman Sorcery</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
  #game { border:0; width:100%; height:100%; display:block; }
</style>
</head>
<body>
<iframe id="game" allowfullscreen></iframe>
<script>
  // Portable launcher for the offline Talisman Sorcery slot. The game's own
  // engine runs against local files; the offline backend (js/offline-server.js)
  // answers every server call, so no network / login is required. To embed
  // elsewhere, copy the whole TalismanSorcery folder and load this index.html.
  var params = {
    gamesession: 'offline|SL5R-TS|1|1|OFFLINE|en',
    lang: 'en',
    gamecode: 'SL5R-TS',
    showcashier: '0',
    showhistory: '1',
    showtype: '1',
    showchips: '0.50,1.00,2.00,5.00',
    shownavbar: '1',
    showrebates: '0',
    currency: 'USD,$,¢,p,5,2',
    accountid: '1',
    noexit: '1'
  };
  var qs = Object.keys(params).map(function (k) { return k + '=' + params[k]; }).join('&');
  document.getElementById('game').src = 'game/index.html?' + qs;
</script>
</body>
</html>
