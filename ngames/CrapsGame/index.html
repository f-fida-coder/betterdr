<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Craps</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
  #game { border:0; width:100%; height:100%; display:block; }
</style>
</head>
<body>
<iframe id="game" allowfullscreen></iframe>
<script>
  // Portable launcher for the offline Craps build. It points the game's own
  // engine at local files; the offline backend (js/offline-server.js) answers
  // every server call, so no network / login is required. To embed elsewhere,
  // copy the whole CrapsGame folder and load this index.html (or the CP page
  // directly with the same query string).
  var params = {
    gamesession: 'offline|CP|1|1|OFFLINE|en',
    lang: 'en',
    gamecode: 'CP',
    showcashier: '0',
    showhistory: '1',
    showtype: '1',
    showchips: '1,5,25,100,500',
    shownavbar: '1',
    showrebates: '0',
    currency: 'USD,$,¢,p,5,2',
    accountid: '1',
    noexit: '1'
  };
  // Values are placed raw (not URL-encoded): the game's getUrlVars() does not
  // decode, so commas in showchips/currency must stay literal.
  var qs = Object.keys(params).map(function (k) { return k + '=' + params[k]; }).join('&');
  document.getElementById('game').src =
    'game/index.html?' + qs;
</script>
</body>
</html>
