<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jokers Wild — Video Poker</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
  #game { border:0; width:100%; height:100%; display:block; }
</style>
</head>
<body>
<iframe id="game" allowfullscreen></iframe>
<script>
  // Portable launcher for the offline Jokers Wild video poker build. The game's
  // own engine runs against local files; the offline backend (offline-server.js)
  // answers every server call, so no network / login is required. To embed
  // elsewhere, copy the whole VideoPokerJW folder and load this index.html.
  var params = {
    gamesession: 'offline|VPJW|1|1|OFFLINE|en',
    lang: 'en',
    gamecode: 'VPJW',
    showcashier: '0',
    showhistory: '1',
    showtype: '1',
    currency: 'USD,$,¢,p,5,2',
    accountid: '1',
    noexit: '1'
  };
  var qs = Object.keys(params).map(function (k) { return k + '=' + params[k]; }).join('&');
  document.getElementById('game').src = 'game/index.html?' + qs;
</script>
</body>
</html>
