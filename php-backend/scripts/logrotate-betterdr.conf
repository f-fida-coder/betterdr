# Logrotate policy for betterdr app logs (run as the site user, not root).
#
# WHY: app logs grow forever otherwise — sportsbook-ops.log alone reached
# 459MB before this shipped. Policy: once a log passes 20M it is rotated,
# old copies are gzipped, and only the 4 most recent copies are kept, so
# the logs directory stays bounded (~worst case a few hundred MB total)
# while still holding weeks of compressed history for debugging.
#
# copytruncate matters: odds-worker / ws daemons / watchdogs keep their
# log file descriptors open for days. Default rotation (rename + create)
# would leave them writing into the renamed file forever; copytruncate
# copies the content aside and truncates the original in place, so
# long-running writers never need a restart. (Trade-off: lines written
# during the copy instant can be lost — fine for logs.)
#
# php-backend/cache/ws-events.log is deliberately NOT listed: the ws
# server rotates it itself (ws-events.log.1) — double rotation would
# fight it.
#
# Install (cron, daily as site user — size trigger means most days no-op):
#   37 9 * * * /usr/sbin/logrotate -s /home/bettorplays247/.logrotate-betterdr.state /home/bettorplays247/htdocs/www.bettorplays247.com/betterdr/php-backend/scripts/logrotate-betterdr.conf
#
# Manual run / debug:
#   /usr/sbin/logrotate -v -s ~/.logrotate-betterdr.state php-backend/scripts/logrotate-betterdr.conf

/home/bettorplays247/htdocs/www.bettorplays247.com/betterdr/php-backend/logs/*.log {
  size 20M
  rotate 4
  compress
  missingok
  notifempty
  copytruncate
}
