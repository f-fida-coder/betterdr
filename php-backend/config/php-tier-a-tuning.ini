; ============================================================================
; Tier A — Maximum-performance OPcache + JIT tuning (production)
; ============================================================================
; This is a stricter, faster variant of php-fpm-opcache-phase13.conf intended
; for steady-state production where deploys are scripted (and can issue an
; opcache reset). It trades the 1-second auto-revalidation for higher
; throughput by skipping mtime checks entirely.
;
; HOW TO APPLY (do not enable both at once):
;   1) Copy the [opcache] block below into your production php.ini,
;      OR include this file via `php --define opcache.preload=...` style.
;   2) In your deploy script, after pulling new code, run:
;          php-fpm reload          # SIGUSR2 — reloads opcache safely
;        OR
;          systemctl reload php-fpm
;        OR (last resort)
;          php -r 'opcache_reset();' via cli-server or fpm status hook
;   3) Verify:
;          curl https://yourapi/api/_php/health
;          and inspect: opcache_get_status()['opcache_statistics']
;
; ROLLBACK: simply switch validate_timestamps back to 1 and reload php-fpm.
; The site will resume mtime-based reloads without a restart.
; ============================================================================

[opcache]
opcache.enable=1
opcache.enable_cli=0

; --- Fast path: trust the deploy reset, skip mtime checks ---
; This is the single biggest OPcache win. Cuts ~5-15ms per request that
; previously stat()ed every included file.
opcache.validate_timestamps=0

; Memory: bumped from 256 -> 384 to fit preloaded class graph + game configs.
opcache.memory_consumption=384

; Bumped from 20000 -> 30000 to leave headroom for vendor + game scripts.
opcache.max_accelerated_files=30000

; Interned strings buffer: 16 -> 32 (large JSON-heavy app benefits).
opcache.interned_strings_buffer=32

; Keep doc comments so reflection-based code (PHPDoc-driven routing, ORM
; annotations) keeps working. Don't drop this.
opcache.save_comments=1

opcache.fast_shutdown=1

; --- JIT: tracing mode, 128M buffer ---
; jit=tracing is the most aggressive non-experimental mode in PHP 8.x.
; Buffer doubled from 64M -> 128M; tracing JIT keeps hot loops compiled.
opcache.jit=tracing
opcache.jit_buffer_size=128M

; --- Preload: load hot classes once at FPM master start ---
; The preload.php file in this same directory wires up controllers,
; SqlRepository, Auth, and other request-critical classes so they live
; in shared OPcache memory and are NEVER re-parsed per request.
;
; Uncomment after you copy preload.php into a path the FPM user can read.
; opcache.preload=/var/www/betterdr/php-backend/config/preload.php
; opcache.preload_user=www-data

; ============================================================================
; Realpath cache (often overlooked, real win on file-include-heavy apps)
; ============================================================================
realpath_cache_size=4096K
realpath_cache_ttl=600

; ============================================================================
; Output buffering / misc per-request overhead
; ============================================================================
; Disable expose_php so the server stops adding the X-Powered-By header.
expose_php=Off

; Reasonable default for JSON APIs — output buffer kept small to flush sooner.
output_buffering=4096

; ============================================================================
; SAFETY NOTES
; ============================================================================
; 1) The [www] FPM section in php-fpm-opcache-phase13.conf is still correct.
;    Don't duplicate it here; this file is OPcache-only.
; 2) If your deploy is FTP/rsync-based with NO post-deploy reload step,
;    DO NOT set validate_timestamps=0. Stay on the phase13 config until you
;    have a deploy hook that runs `systemctl reload php-fpm` or equivalent.
; 3) After enabling, monitor `opcache_get_status()` for:
;       - hits/misses ratio (should be > 99% in steady state)
;       - num_cached_scripts vs max_accelerated_files (raise if > 80%)
;       - memory_consumption.used_memory (raise memory_consumption if > 85%)
