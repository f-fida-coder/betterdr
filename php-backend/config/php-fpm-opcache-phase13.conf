; Phase 13: Recommended PHP-FPM + OPcache settings for high concurrency.
; Target profile: up to ~20k active users (actual limits depend on traffic shape and RAM).
; Apply to your production php.ini / pool config and tune after observing memory + p95 latency.

; -----------------------------------------------------------------------------
; OPcache (php.ini)
; -----------------------------------------------------------------------------
[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.validate_timestamps=1
opcache.revalidate_freq=1
opcache.memory_consumption=256
opcache.max_accelerated_files=20000
opcache.interned_strings_buffer=16
opcache.save_comments=1
opcache.fast_shutdown=1
opcache.jit=1255
opcache.jit_buffer_size=64M

; -----------------------------------------------------------------------------
; PHP-FPM process manager (www.conf or pool file)
; -----------------------------------------------------------------------------
[www]
pm=dynamic
pm.max_children=50
pm.start_servers=10
pm.min_spare_servers=10
pm.max_spare_servers=20
pm.max_requests=1000
request_terminate_timeout=60s

; -----------------------------------------------------------------------------
; Capacity notes
; -----------------------------------------------------------------------------
; 1) Estimate per-worker RSS first (use `ps -ylC php-fpm --sort:rss` or top).
; 2) Keep total PHP-FPM memory <= ~65% of RAM:
;       pm.max_children ~= floor((RAM * 0.65) / avg_worker_rss)
; 3) If you see swap activity, reduce pm.max_children first.
; 4) If CPU is saturated but RAM is healthy, increase pm.max_children gradually.
;
; Example sizing (rough):
; - 8 GB RAM and 90 MB avg worker RSS => floor((8192 * 0.65) / 90) ~= 59 children
; - 16 GB RAM and 120 MB avg worker RSS => floor((16384 * 0.65) / 120) ~= 88 children
;
; Monitor after applying:
; - php-fpm: listen queue, max children reached
; - php: opcache hit rate, restart count
; - mysql: Threads_running, p95 query time
; - app: /api/_php/health latency and 5xx rate
